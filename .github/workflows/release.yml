name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Align package version with tag
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v(.+)$') { $ver = $Matches[1] } else { $ver = $ref }
          npm version $ver --no-git-tag-version --allow-same-version

      - name: Build portable .exe
        run: npm run dist:portable
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Locate portable executable
        id: artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*.exe" -File | Where-Object { $_.Name -notmatch "Setup" } | Select-Object -First 1
          if (-not $exe) {
            Get-ChildItem dist -Recurse -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
            throw "Portable .exe not found under dist/"
          }
          "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: ${{ steps.artifact.outputs.path }}
          generate_release_notes: true

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Align package version with tag
        run: |
          REF="${{ github.ref_name }}"
          if [[ "$REF" =~ ^v(.*)$ ]]; then
            VER="${BASH_REMATCH[1]}"
          else
            VER="$REF"
          fi
          npm version "$VER" --no-git-tag-version --allow-same-version

      - name: Build macOS app
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.dmg
            dist/*.zip
